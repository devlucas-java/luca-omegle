version: "3.9"

services:
  redis:
    image: redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass my_password_redis
    environment:
      - name=value

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
  
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - default.env
    depends_on:
      - redis
      - postgres